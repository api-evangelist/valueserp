aid: valueserp
name: ValueSERP
description: >-
  ValueSERP is a real-time Google Search API providing SERP results, image
  search, news search, shopping results, places, and local pack data via a
  simple REST interface with JSON output. Operated by Traject Data, it offers
  low-cost, high-reliability SERP data with no queues, batch processing
  capabilities, and pay-as-you-go or subscription pricing starting at $50/month
  for 25,000 searches.
