name: ValueSERP Plans and Pricing
description: >-
  ValueSERP offers subscription plans billed monthly or annually (10% discount
  for annual) as well as a pay-as-you-go option. All plans include real-time
  API access with no queues, flexible upgrade/downgrade/cancellation, and
  a 100-search free trial on signup with no credit card required.
specificationVersion: "0.1"
url: https://trajectdata.com/serp/value-serp-api/pricing/

plans:
  - name: Pay As You Go
    description: >-
      Flexible pay-as-you-go access with no monthly commitment. Minimum
      purchase of $25 for 10,000 requests. Includes 100 free requests on
      signup.
    url: https://trajectdata.com/serp/value-serp-api/pricing/
    price: 2.50
    unit: per 1,000 searches
    currency: USD
    billingCycle: one-time
    rateLimitPerMinute: 250
    batchCapacity: 10000
    features:
      - Real-time API access with no queues
      - 100 free requests on signup
      - No monthly commitment
      - Minimum purchase $25 (10,000 requests)
      - JSON, HTML, CSV output formats
      - Multiple payment methods

